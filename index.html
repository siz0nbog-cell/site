    .opts{display:grid;gap:8px}
    .opt{display:flex;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#0b1220}
    .opt.correct{border-color:rgba(34,197,94,.55);background:linear-gradient(90deg,var(--greenBg),#0b1220)}
    .letter{width:25px;min-width:25px;height:25px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#cbd5e1}
    .correct .letter{border-color:var(--green);color:#052e16;background:var(--green)}
    .check{color:var(--green);font-weight:800;margin-left:auto;white-space:nowrap}
    .note{margin-top:10px;color:#fbbf24;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.27);border-radius:12px;padding:10px;font-size:13px}

    .variant-ans{color:#e5e7eb;font-weight:800;white-space:nowrap}

</head>

const $ = (s)=>document.querySelector(s);
const list = $('#list');
const keyGrid = $('#keyGrid');
const tagSel = $('#tag');
const search = $('#search');
const mode = $('#mode');
const stats = $('#stats');

function lettersFrom(arr){return (arr||[]).map(x=>String(x).toUpperCase()).join(' + ')}
function letters(q){return lettersFrom(q.correct)}
function variantText(v){return v.text || lettersFrom(v.answers)}
function init(){
  const tags=[...new Set(QUESTIONS.map(q=>q.tag))];
  for(const t of tags){const o=document.createElement('option');o.value=t;o.textContent=t;tagSel.appendChild(o)}
  keyGrid.innerHTML = QUESTIONS.map(q=>`<div class="key-item ${q.variants?'var':''}"><span>${q.n}</span>: ${letters(q)}${q.variants?'<small class="mini">есть 2 варианта</small>':''}</div>`).join('');
  render();
}
function render(){
  const qtext = search.value.trim().toLowerCase();
  const tag = tagSel.value;
  const m = mode.value;
  const filtered = QUESTIONS.filter(q=>{
    const vars = q.variants ? q.variants.map(v=>v.name+' '+variantText(v)).join(' ') : '';
    const hay = (q.q+' '+Object.values(q.opts).join(' ')+' '+(q.note||'')+' '+vars).toLowerCase();
    if(qtext && !hay.includes(qtext)) return false;
    if(tag !== 'all' && q.tag !== tag) return false;
    if(m === 'notes' && !(q.note || q.variants)) return false;
    return true;
  });
  stats.innerHTML = `<div class="pill"><b>${QUESTIONS.length}</b> вопросов</div><div class="pill"><b>${filtered.length}</b> показано</div><div class="pill"><b>${QUESTIONS.filter(q=>q.note || q.variants).length}</b> спорных/с примечаниями</div><div class="pill"><b>${QUESTIONS.filter(q=>q.variants).length}</b> с двумя вариантами</div>`;
  if(!filtered.length){list.innerHTML='<div class="empty">Ничего не найдено.</div>';return;}
  list.innerHTML = filtered.map(q=>card(q)).join('');
}
function card(q){
  const opts = Object.entries(q.opts).map(([k,v])=>{
    const ok = q.correct.includes(k);
    return `<div class="opt ${ok?'correct':''}"><div class="letter">${k}</div><div>${escapeHtml(v)}</div>${ok?'<div class="check">✓</div>':''}</div>`;
  }).join('');
  const variants = q.variants ? `<div class="variants"><div class="variants-title">Два варианта ответа</div>${q.variants.map(v=>`<div class="variant-row"><div class="variant-name">${escapeHtml(v.name)}</div><div class="variant-ans">${escapeHtml(variantText(v))}</div></div>`).join('')}</div>` : '';
  return `<article class="question" id="q${q.n}">
    <div class="q-head"><div class="q-title">${q.n}. ${escapeHtml(q.q)}</div><div class="tag">${q.tag}</div></div>
    <div class="opts">${opts}</div>
    ${variants}
    ${q.note ? `<div class="note">⚠ ${escapeHtml(q.note)}</div>` : ''}
  </article>`;
}
function escapeHtml(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}
search.addEventListener('input',render);tagSel.addEventListener('change',render);mode.addEventListener('change',render);
$('#copy').addEventListener('click', async()=>{
  const txt = QUESTIONS.map(q=>{
    const main = `${q.n}: ${letters(q)}`;
    const vars = q.variants ? ' | варианты: ' + q.variants.map(v=>`${v.name} — ${variantText(v)}`).join('; ') : '';
    return main + vars;
  }).join('\n');
  try{await navigator.clipboard.writeText(txt); $('#copy').textContent='Скопировано'; setTimeout(()=>$('#copy').textContent='Скопировать ключ',1200)}catch(e){alert(txt)}
});
init();
